<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Profile Finder</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #00f0ff;
    }

    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .search-box input {
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      border-radius: 5px 0 0 5px;
      width: 300px;
      outline: none;
    }

    .search-box button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 0 5px 5px 0;
      background-color: #00f0ff;
      color: #000;
      cursor: pointer;
      transition: background 0.3s;
    }

    .search-box button:hover {
      background-color: #00ccdd;
    }

    .profile-card {
      background-color: #1e1e1e;
      padding: 25px;
      border-radius: 10px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
      display: none;
    }

    .profile-card .avatar {
      display: block;
      margin: 0 auto 15px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-card .info {
      margin-bottom: 10px;
    }

    .profile-card .info strong {
      color: #00f0ff;
    }

    .profile-card .info p {
      margin: 5px 0;
    }

    .profile-card a {
      color: #00f0ff;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }

    .profile-card a:hover {
      text-decoration: underline;
    }

    .no-result {
      color: red;
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>TikTok Profile Finder</h1>
  <div class="search-box">
    <input type="text" id="username" placeholder="Enter TikTok Username" />
    <button onclick="fetchProfile()">Search</button>
  </div>
  <div class="profile-card" id="profileCard">
    <img id="avatar" class="avatar" src="" alt="Avatar" />
    <div class="info">
      <p><strong>Username:</strong> <span id="usernameDisplay"></span></p>
      <p><strong>Nickname:</strong> <span id="nickname"></span></p>
      <p><strong>Followers:</strong> <span id="followers"></span></p>
      <p><strong>Following:</strong> <span id="following"></span></p>
      <p><strong>Total Likes:</strong> <span id="likes"></span></p>
      <p><strong>Video Count:</strong> <span id="videos"></span></p>
      <p><strong>User ID:</strong> <span id="userId"></span></p>
      <p><strong>SecUID:</strong> <span id="secUid"></span></p>
      <p><strong>Country:</strong> <span id="country"></span></p>
      <p><strong>Created At:</strong> <span id="createdAt"></span></p>
      <a id="profileLink" href="" target="_blank">View Profile</a>
    </div>
  </div>
  <div class="no-result" id="noResult">No profile found. Try a different username.</div>

  <script>
    function fetchProfile() {
      const username = document.getElementById("username").value.trim();
      const profileCard = document.getElementById("profileCard");
      const noResult = document.getElementById("noResult");

      if (!username) {
        alert("Please enter a TikTok username.");
        return;
      }

      const accessToken = "YOUR_ACCESS_TOKEN"; // Replace with your TikTok Business API token

      fetch(`https://business-api.tiktok.com/open_api/v1.3/user/full_info/`, {
        method: "GET",
        headers: {
          "Access-Token": accessToken,
          "Content-Type": "application/json"
        },
        params: {
          username: username
        }
      })
        .then(response => {
          if (!response.ok) {
            throw new Error("Network response was not OK.");
          }
          return response.json();
        })
        .then(data => {
          if (data.code !== 0) {
            noResult.style.display = "block";
            profileCard.style.display = "none";
            return;
          }

          document.getElementById("usernameDisplay").textContent = data.data.user.username;
          document.getElementById("nickname").textContent = data.data.user.nickname;
          document.getElementById("followers").textContent = data.data.user.stats.follower_count;
          document.getElementById("following").textContent = data.data.user.stats.following_count;
          document.getElementById("likes").textContent = data.data.user.stats.heart_count;
          document.getElementById("videos").textContent = data.data.user.stats.video_count;
          document.getElementById("userId").textContent = data.data.user.id;
          document.getElementById("secUid").textContent = data.data.user.sec_uid;
          document.getElementById("country").textContent = data.data.user.country;
          document.getElementById("createdAt").textContent = new Date(data.data.user.create_time * 1000).toLocaleString();

          document.getElementById("avatar").src = data.data.user.avatar_url;
          document.getElementById("profileLink").href = `https://tiktok.com/@${data.data.user.username}`;

          profileCard.style.display = "block";
          noResult.style.display = "none";
        })
        .catch(error => {
          console.error("Error:", error);
          noResult.style.display = "block";
          profileCard.style.display = "none";
        });
    }
  </script>
</body>
</html>
