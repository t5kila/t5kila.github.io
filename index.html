<body>
    <div class="container">

                <div class="dot blue"></div>
                <div class="dot green"></div>

            </div>
            <div class="brand">@t5kila</div>
        </div>
        
        <div class="content">
            <div class="banner">
                <div class="banner-text">
                    <div class="red">════════════════════════════════════════</div>
                    <div class="blue">TikTok Information Finder Tool</div>
                    <div class="green">Created by @t5kila</div>
                    <div class="red">════════════════════════════════════════</div>
                </div>
            </div>

            <div class="search-box">
                <span class="at">@</span>
                <input type="text" id="username" placeholder="Enter username (e.g., charlidamelio)" value="charlidamelio">
                <button class="search-btn" id="scanBtn">SCAN</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span class="loading-text">Fetching profile data...</span>
            </div>

            <div class="error" id="error"></div>

            <div class="results" id="results">
                <!-- Results will be inserted here by JavaScript -->
            </div>

            <div class="footer">
                <span class="red">© 2023-2026</span> | Made with 
                <span class="blue">❤️</span> by <span class="green">@t5kila</span>
            </div>
        </div>
    </div>

    <script>
        class TikTokFinder {
            constructor() {
                this.headers = {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                };
            }

            async fetchProfile(username) {
                try {
                    // Try multiple endpoints
                    const endpoints = [
                        `https://www.tiktok.com/@${username}`,
                        `https://api16-normal-c-useast1a.tiktokv.com/aweme/v1/web/user/profile/?unique_id=${username}`
                    ];

                    for (const endpoint of endpoints) {
                        try {
                            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(endpoint)}`;
                            const res = await fetch(proxy);
                            if (!res.ok) continue;
                            
                            const text = await res.text();
                            
                            // Try JSON
                            try {
                                const json = JSON.parse(text);
                                const info = this.parseJSON(json);
                                if (info) return info;
                            } catch {
                                // Try HTML
                                const match = text.match(/<script id="__UNIVERSAL_DATA_FOR_REHYDRATION__" type="application\/json">(.*?)<\/script>/s);
                                if (match) {
                                    const json = JSON.parse(match[1]);
                                    const info = this.parseJSON(json);
                                    if (info) return info;
                                }
                            }
                        } catch (e) {}
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            parseJSON(json) {
                try {
                    // Try different paths
                    const paths = [
                        () => json?.__DEFAULT_SCOPE__?.['webapp.user-detail']?.userInfo,
                        () => json?.__DEFAULT_SCOPE__?.['user-detail']?.userInfo,
                        () => json?.userInfo,
                        () => json?.data?.userInfo,
                        () => json?.user ? { user: json.user, stats: json.stats || {} } : null
                    ];

                    for (const path of paths) {
                        const result = path();
                        if (result) return result;
                    }
                    return null;
                } catch {
                    return null;
                }
            }

            formatNumber(num) {
                if (!num) return '0';
                if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num/1000).toFixed(1) + 'K';
                return num.toString();
            }

            parseData(userInfo) {
                try {
                    const user = userInfo.user || {};
                    const stats = userInfo.stats || {};
                    
                    return {
                        username: user.uniqueId || user.unique_id || 'N/A',
                        user_id: user.id || user.uid || 'N/A',
                        nickname: user.nickname || 'N/A',
                        bio: user.signature || 'No bio',
                        bio_link: user.bioLink?.link || user.bio_link || 'No link',
                        verified: user.verified || user.is_verified || false,
                        private: user.privateAccount || user.is_private || false,
                        followers: stats.followerCount || stats.follower_count || user.follower_count || 0,
                        following: stats.followingCount || stats.following_count || user.following_count || 0,
                        likes: stats.heartCount || stats.heart_count || user.total_favorited || 0,
                        videos: stats.videoCount || stats.video_count || user.aweme_count || 0,
                        avatar: user.avatarLarger || user.avatar_larger || '',
                        created: user.createTime || user.create_time || 0,
                        region: user.region || 'N/A',
                        sec_uid: user.secUid || user.sec_uid || 'N/A'
                    };
                } catch {
                    return null;
                }
            }

            displayResults(data, username) {
                const date = data.created ? new Date(data.created * 1000).toLocaleDateString() : 'Unknown';
                const followersF = this.formatNumber(data.followers);
                const likesF = this.formatNumber(data.likes);
                
                const html = `
                    <div class="target-header">
                        <div class="red">════════════════════════════════════════</div>
                        <div class="blue">[ TARGET: @${username} ]</div>
                        <div class="green">════════════════════════════════════════</div>
                    </div>

                    <div class="section-title">📌 BASIC INFO</div>
                    <div class="grid-2">
                        <div class="info-card">
                            <div class="label">User ID</div>
                            <div class="value">${data.user_id}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">Nickname</div>
                            <div class="value">${data.nickname}</div>
                        </div>
                        <div class="info-card" style="grid-column: span 2;">
                            <div class="label">Bio</div>
                            <div class="value">${data.bio}</div>
                        </div>
                    </div>

                    <div class="section-title">🔐 STATUS</div>
                    <div class="grid-2">
                        <div class="info-card">
                            <div class="label">Verified</div>
                            <div class="value ${data.verified ? 'highlight' : ''}">${data.verified ? '✅ Yes' : '❌ No'}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">Private</div>
                            <div class="value">${data.private ? '✅ Yes' : '❌ No'}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">Region</div>
                            <div class="value">${data.region}</div>
                        </div>
                        <div class="info-card">
                            <div class="label">Created</div>
                            <div class="value">${date}</div>
                        </div>
                    </div>

                    <div class="section-title">📊 STATS</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${followersF}</div>
                            <div class="stat-label">FOLLOWERS</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${data.following}</div>
                            <div class="stat-label">FOLLOWING</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${likesF}</div>
                            <div class="stat-label">LIKES</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${data.videos}</div>
                            <div class="stat-label">VIDEOS</div>
                        </div>
                    </div>

                    <div class="section-title">🖼️ MEDIA</div>
                    <div class="info-card">
                        <div class="label">Avatar URL</div>
                        <div class="avatar-url">${data.avatar || 'No avatar'}</div>
                    </div>

                    <div class="section-title">🔧 ADVANCED</div>
                    <div class="info-card">
                        <div class="label">secUid</div>
                        <div class="value small">${data.sec_uid.substring(0, 40)}${data.sec_uid.length > 40 ? '...' : ''}</div>
                    </div>

                    <button class="save-btn" onclick="saveResults()">💾 SAVE RESULTS</button>
                `;
                
                document.getElementById('results').innerHTML = html;
                window.lastData = { data, username };
            }
        }

        // Global save function
        window.saveResults = function() {
            if (!window.lastData) {
                alert('No data to save');
                return;
            }
            
            const { data, username } = window.lastData;
            const output = {
                username: username,
                scan_time: new Date().toISOString(),
                profile: data,
                created_by: '@t5kila'
            };
            
            const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tiktok_${username}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // Initialize
        const finder = new TikTokFinder();
        const scanBtn = document.getElementById('scanBtn');
        const usernameInput = document.getElementById('username');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const error = document.getElementById('error');

        async function scan() {
            let username = usernameInput.value.trim().replace(/^@/, '');
            if (!username) {
                showError('Enter a username');
                return;
            }

            loading.classList.add('active');
            scanBtn.disabled = true;
            error.classList.remove('active');
            results.classList.remove('active');

            const userInfo = await finder.fetchProfile(username);
            
            loading.classList.remove('active');
            scanBtn.disabled = false;

            if (!userInfo) {
                showError(`Could not find @${username}`);
                return;
            }

            const data = finder.parseData(userInfo);
            if (!data) {
                showError('Failed to parse data');
                return;
            }

            finder.displayResults(data, username);
            results.classList.add('active');
        }

        function showError(msg) {
            error.textContent = msg;
            error.classList.add('active');
        }

        scanBtn.addEventListener('click', scan);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') scan();
        });

        // Auto-scan on load
        setTimeout(scan, 500);
    </script>
</body>
</html>
