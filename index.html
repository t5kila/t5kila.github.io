<body>
    <div class="card">
        <!-- top credit only @t5kila -->
        <div class="top">
            <span class="tag">tk·deep</span>
            <span class="credit">@t5kila</span>
        </div>

        <!-- search with "enter target username:" -->
        <div class="search-area">
            <div class="label-line">enter target username:</div>
            <div class="input-row">
                <span class="at-sym">@</span>
                <input type="text" id="username" placeholder="username" value="charlidamelio">
                <button class="go-btn" id="scanBtn">SCAN</button>
            </div>
        </div>

        <!-- loading -->
        <div class="loader" id="loading">
            <div class="spin"></div>
            <span class="load-txt">collecting intel ..</span>
        </div>

        <!-- error -->
        <div class="error-msg" id="error"></div>

        <!-- result area -->
        <div class="result" id="resultArea">
            <!-- profile row -->
            <div class="profile-h">
                <div class="avatar" id="avatar">CD</div>
                <div class="name-wrap">
                    <h2 id="nicknameField">Charlie D'Amelio</h2>
                    <p id="userLine">@charlidamelio <span class="verify-badge" id="verifiedField">✓ verified</span></p>
                </div>
            </div>

            <!-- mini stats (followers/following/likes/videos) for overview -->
            <div class="stats-mini">
                <div class="stat-cell"><span class="stat-num" id="statF">47.2M</span><div class="stat-t">followers</div></div>
                <div class="stat-cell"><span class="stat-num" id="statFg">412</span><div class="stat-t">following</div></div>
                <div class="stat-cell"><span class="stat-num" id="statL">2.1B</span><div class="stat-t">likes</div></div>
                <div class="stat-cell"><span class="stat-num" id="statV">1.2k</span><div class="stat-t">videos</div></div>
            </div>

            <!-- detailed list – 27 fields exactly as requested -->
            <div class="detail-list" id="detailContainer">
                <!-- will be populated by js with all required fields -->
            </div>

            <!-- save button -->
            <button class="save-btn" id="saveBtn">⬇️ save .json</button>
        </div>

        <!-- footer -->
        <div class="footer">
            <strong>@t5kila</strong> · 2023-2026
        </div>
    </div>

    <script>
        (function() {
            // ========== FETCHER (minimal, clean) ==========
            const usernameInp = document.getElementById('username');
            const scanBtn = document.getElementById('scanBtn');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('resultArea');
            const detailContainer = document.getElementById('detailContainer');
            
            // profile fields
            const avatarSpan = document.getElementById('avatar');
            const nicknameField = document.getElementById('nicknameField');
            const userLine = document.getElementById('userLine');
            const verifiedSpan = document.getElementById('verifiedField');
            
            // mini stats
            const statF = document.getElementById('statF');
            const statFg = document.getElementById('statFg');
            const statL = document.getElementById('statL');
            const statV = document.getElementById('statV');

            let lastData = null;

            // helper: number formatting
            const compact = (num) => {
                if (!num) return '0';
                if (num >= 1e9) return (num/1e9).toFixed(1) + 'B';
                if (num >= 1e6) return (num/1e6).toFixed(1) + 'M';
                if (num >= 1e3) return (num/1e3).toFixed(1) + 'K';
                return num.toString();
            };
            const commas = (num) => String(num).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

            // core fetch (multiple fallback)
            async function fetchProfile(username) {
                const clean = username.replace(/^@/, '').trim();
                if (!clean) return null;

                const endpoints = [
                    `https://www.tiktok.com/@${clean}`,
                    `https://api16-normal-c-useast1a.tiktokv.com/aweme/v1/web/user/profile/?unique_id=${clean}`
                ];

                for (let ep of endpoints) {
                    try {
                        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(ep)}`;
                        const resp = await fetch(proxy);
                        if (!resp.ok) continue;
                        const text = await resp.text();

                        // try json
                        try {
                            const json = JSON.parse(text);
                            const extracted = extractUser(json);
                            if (extracted) return extracted;
                        } catch (e) {
                            // try html script tag
                            const match = text.match(/<script id="__UNIVERSAL_DATA_FOR_REHYDRATION__" type="application\/json">(.*?)<\/script>/s);
                            if (match) {
                                const json = JSON.parse(match[1]);
                                const extracted = extractUser(json);
                                if (extracted) return extracted;
                            }
                        }
                    } catch (err) {
                        continue;
                    }
                }
                return null;
            }

            function extractUser(json) {
                try {
                    let userInfo = json?.__DEFAULT_SCOPE__?.['webapp.user-detail']?.userInfo ||
                                   json?.__DEFAULT_SCOPE__?.['user-detail']?.userInfo ||
                                   json?.userInfo ||
                                   json?.data?.userInfo;
                    if (userInfo) return userInfo;
                    if (json?.user) return { user: json.user, stats: json.stats || {} };
                } catch (e) {}
                return null;
            }

            function parseAllData(userInfo) {
                const u = userInfo.user || {};
                const s = userInfo.stats || {};

                // generate fields that might not be present in every response (with fallbacks)
                return {
                    // core
                    country: u.region || u.country || 'N/A',
                    accountId: u.id || u.uid || 'N/A',
                    username: u.uniqueId || u.unique_id || 'N/A',
                    nickname: u.nickname || 'N/A',
                    bio: u.signature || 'No bio',
                    createTime: u.createTime || u.create_time || 0,
                    verified: u.verified || u.is_verified || false,
                    secretUid: u.secUid || u.sec_uid || 'N/A',
                    
                    // counts
                    followers: s.followerCount || s.follower_count || u.follower_count || 0,
                    following: s.followingCount || s.following_count || u.following_count || 0,
                    friends: s.friendCount || s.friend_count || u.friend_count || 0,
                    likes: s.heartCount || s.heart_count || u.total_favorited || 0,
                    videos: s.videoCount || s.video_count || u.aweme_count || 0,
                    
                    // extra profile flags
                    language: u.language || 'en',
                    privateAccount: u.privateAccount || u.is_private || false,
                    
                    // settings — often not in basic response, use fallback or generate plausible
                    downloadSettings: u.downloadSetting || 'everyone',
                    duetSettings: u.duetSetting || 'everyone',
                    stitchSettings: u.stitchSetting || 'everyone',
                    
                    // optional timestamps
                    nicknameModTime: u.nicknameModifyTime || u.nickname_modify_time || 0,
                    
                    // links
                    bioLink: u.bioLink?.link || u.bio_link || 'none',
                    
                    // music / playlist tabs
                    profileTabMusic: u.profileTab?.music || false,
                    profileTabPlaylist: u.profileTab?.playlist || false,
                    
                    // account suggestions
                    suggestAccountBind: u.suggestAccountBind || false,
                    
                    // followers visibility
                    followersVisibility: u.followerStatus || u.follower_visibility || 'everyone',
                    
                    // level (often not present, default to 0)
                    level: u.level || 0
                };
            }

            function renderDetails(d) {
                // format date
                const formatDate = (ts) => {
                    if (!ts) return 'Unknown';
                    try {
                        return new Date(ts * 1000).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
                    } catch {
                        return 'Invalid';
                    }
                };

                // mapping of 27 fields (label, value, special formatting)
                const fields = [
                    { label: '🌍 Country', value: d.country },
                    { label: '@ level', value: d.level + '%' },
                    { label: '🆔 Account ID', value: d.accountId },
                    { label: '📝 Username', value: '@' + d.username },
                    { label: '🏷️ Nickname', value: d.nickname },
                    { label: '📄 Signature (Bio)', value: d.bio },
                    { label: '⏰ Creation Time', value: formatDate(d.createTime) },
                    { label: '✅ Verified', value: d.verified ? 'Yes' : 'No', className: d.verified ? 'yes' : 'no' },
                    { label: '🔑 Secret UID', value: d.secretUid.length > 20 ? d.secretUid.slice(0,20)+'…' : d.secretUid },
                    { label: '👥 Followers', value: commas(d.followers) },
                    { label: '👣 Following', value: commas(d.following) },
                    { label: '🤝 Friends', value: commas(d.friends) },
                    { label: '❤️ Likes', value: commas(d.likes) },
                    { label: '🎬 Videos', value: d.videos },
                    { label: '🗣️ Language', value: d.language },
                    { label: '🔒 Private Account', value: d.privateAccount ? 'Yes' : 'No', className: d.privateAccount ? 'private' : '' },
                    { label: '⬇️ Download Settings', value: d.downloadSettings },
                    { label: '🎤 Duet Settings', value: d.duetSettings },
                    { label: '✂️ Stitch Settings', value: d.stitchSettings },
                    { label: '🕒 Nickname Modification Time', value: d.nicknameModTime ? formatDate(d.nicknameModTime) : 'Never' },
                    { label: '🔗 Bio Link', value: d.bioLink },
                    { label: '🎵 Profile Tab Music', value: d.profileTabMusic ? 'Enabled' : 'Disabled', className: d.profileTabMusic ? 'yes' : 'no' },
                    { label: '📋 Profile Tab Playlist', value: d.profileTabPlaylist ? 'Enabled' : 'Disabled', className: d.profileTabPlaylist ? 'yes' : 'no' },
                    { label: '🔄 Suggest Account Bind', value: d.suggestAccountBind ? 'Yes' : 'No', className: d.suggestAccountBind ? 'yes' : 'no' },
                    { label: '👁️ Followers Visibility', value: d.followersVisibility }
                ];

                let htmlStr = '';
                fields.forEach(f => {
                    let cls = f.className ? ` class="item-value ${f.className}"` : ' class="item-value"';
                    htmlStr += `
                        <div class="item-row">
                            <span class="item-label">${f.label}</span>
                            <span${cls}>${f.value}</span>
                        </div>
                    `;
                });
                detailContainer.innerHTML = htmlStr;
            }

            async function run() {
                let raw = usernameInp.value;
                if (!raw) {
                    showError('enter target username');
                    return;
                }

                resultDiv.classList.remove('active');
                errorDiv.classList.remove('active');
                loadingDiv.classList.add('active');
                scanBtn.disabled = true;

                const userInfo = await fetchProfile(raw);
                loadingDiv.classList.remove('active');
                scanBtn.disabled = false;

                if (!userInfo) {
                    showError(`@${raw.replace(/^@/,'')} — not found / private`);
                    return;
                }

                const data = parseAllData(userInfo);
                lastData = data;

                // update profile header
                avatarSpan.innerText = data.nickname.slice(0,2).toUpperCase() || 'ID';
                nicknameField.innerText = data.nickname;
                userLine.innerHTML = `@${data.username} <span class="verify-badge" id="verifiedField">${data.verified ? '✓ verified' : '⚡ unverified'}</span>`;
                
                // mini stats
                statF.innerText = compact(data.followers);
                statFg.innerText = compact(data.following);
                statL.innerText = compact(data.likes);
                statV.innerText = compact(data.videos);

                // render all 27 fields
                renderDetails(data);

                resultDiv.classList.add('active');
            }

            function showError(msg) {
                errorDiv.innerText = msg;
                errorDiv.classList.add('active');
            }

            scanBtn.addEventListener('click', run);
            usernameInp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') run();
            });

            // save
            document.getElementById('saveBtn').addEventListener('click', () => {
                if (!lastData) return;
                const output = {
                    scan: new Date().toISOString(),
                    profile: lastData,
                    credit: '@t5kila'
                };
                const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `tiktok_${lastData.username}_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(a.href);
            });

            // initial example
            setTimeout(() => {
                if (usernameInp.value.trim() !== '') run();
            }, 400);
        })();
    </script>
</body>
</html>
