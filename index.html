    <style>

        .statrow {
            display: flex;

</head>
<body>
    <div class="card">
        <!-- top: only @t5kila -->
        <div class="bar">
            <span class="badge">speed·finder</span>
            <span class="credit">@t5kila</span>
        </div>

        <!-- prompt in Sorani Kurdish -->
        <div class="prompt">ناوی بەکارهێنەر بنووسە @*****</div>

        <!-- search -->
        <div class="search">
            <span class="at-pref">@</span>
            <input type="text" id="target" placeholder="username" value="charlidamelio">
            <button class="find-btn" id="scan">گەڕان</button>
        </div>

        <!-- speed tag -->
        <div class="speed-tag"><span>⚡ SPEED FINDER · خێرا</span></div>

        <!-- loading -->
        <div class="load" id="loading">
            <div class="spinner"></div>
            <span class="load-txt">دۆزینەوە ...</span>
        </div>

        <!-- error -->
        <div class="error" id="error"></div>

        <!-- result block -->
        <div class="result" id="result">
            <!-- profile row -->
            <div class="profile">
                <div class="avatar" id="avatar">CD</div>
                <div class="names">
                    <h2 id="displayName">Charlie D'Amelio</h2>
                    <p id="displayUname">@charlidamelio <span class="verif" id="verifTag">✓ پشتڕاستکراوە</span></p>
                </div>
            </div>

            <!-- mini stats row (followers/following/likes/videos) -->
            <div class="statrow">
                <div class="statb"><span class="statnum" id="mFollowers">47.2M</span><div class="stattxt">شوێنکەوتوو</div></div>
                <div class="statb"><span class="statnum" id="mFollowing">412</span><div class="stattxt">بەشوێنکەوتوو</div></div>
                <div class="statb"><span class="statnum" id="mLikes">2.1B</span><div class="stattxt">دڵخوازی</div></div>
                <div class="statb"><span class="statnum" id="mVideos">1.2k</span><div class="stattxt">ڤیدیۆ</div></div>
            </div>

            <!-- detailed fields (exactly the list) -->
            <div class="dlist" id="detailList">
                <!-- will be filled by js -->
            </div>

            <!-- save button -->
            <button class="save" id="saveBtn">⬇️ پاشەکەوتکردن</button>
        </div>

        <!-- footer with Kurdish note -->
        <div class="foot">
            <strong>@t5kila</strong> · 2023-2026 · بە خێراترین شێوە
        </div>
        <div class="kurdish-note">⚡ بە زمانی کوردی سۆرانی</div>
    </div>

    <script>
        (function() {
            const targetInput = document.getElementById('target');
            const scanBtn = document.getElementById('scan');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            const detailContainer = document.getElementById('detailList');

            const avatarSpan = document.getElementById('avatar');
            const displayName = document.getElementById('displayName');
            const displayUname = document.getElementById('displayUname');
            const verifSpan = document.getElementById('verifTag');

            const mFollowers = document.getElementById('mFollowers');
            const mFollowing = document.getElementById('mFollowing');
            const mLikes = document.getElementById('mLikes');
            const mVideos = document.getElementById('mVideos');

            let lastScan = null;

            // helpers
            const compact = (num) => {
                if (!num) return '0';
                if (num >= 1e9) return (num/1e9).toFixed(1) + 'B';
                if (num >= 1e6) return (num/1e6).toFixed(1) + 'M';
                if (num >= 1e3) return (num/1e3).toFixed(1) + 'K';
                return num.toString();
            };
            const commas = (num) => String(num).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

            // optimized fetch with timeout and speed
            async function fetchTikTok(username) {
                const clean = username.replace(/^@/, '').trim();
                if (!clean) return null;

                const endpoints = [
                    `https://www.tiktok.com/@${clean}`,
                    `https://api16-normal-c-useast1a.tiktokv.com/aweme/v1/web/user/profile/?unique_id=${clean}`
                ];

                for (let ep of endpoints) {
                    try {
                        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(ep)}`;
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 4000); // 4s timeout for speed
                        
                        const resp = await fetch(proxy, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        
                        if (!resp.ok) continue;
                        const text = await resp.text();

                        // try json
                        try {
                            const json = JSON.parse(text);
                            const extracted = extractUser(json);
                            if (extracted) return extracted;
                        } catch (e) {
                            // try html script tag
                            const match = text.match(/<script id="__UNIVERSAL_DATA_FOR_REHYDRATION__" type="application\/json">(.*?)<\/script>/s);
                            if (match) {
                                const json = JSON.parse(match[1]);
                                const extracted = extractUser(json);
                                if (extracted) return extracted;
                            }
                        }
                    } catch (err) {
                        if (err.name === 'AbortError') {
                            console.log('request timeout');
                        }
                        continue;
                    }
                }
                return null;
            }

            function extractUser(json) {
                try {
                    let u = json?.__DEFAULT_SCOPE__?.['webapp.user-detail']?.userInfo ||
                            json?.__DEFAULT_SCOPE__?.['user-detail']?.userInfo ||
                            json?.userInfo ||
                            json?.data?.userInfo;
                    if (u) return u;
                    if (json?.user) return { user: json.user, stats: json.stats || {} };
                } catch (e) {}
                return null;
            }

            function parseAll(userInfo) {
                const u = userInfo.user || {};
                const s = userInfo.stats || {};
                return {
                    country: u.region || u.country || 'N/A',
                    level: u.level || 0,
                    accountId: u.id || u.uid || 'N/A',
                    username: u.uniqueId || u.unique_id || 'N/A',
                    nickname: u.nickname || 'N/A',
                    bio: u.signature || 'No bio',
                    createTime: u.createTime || u.create_time || 0,
                    verified: u.verified || u.is_verified || false,
                    secretUid: u.secUid || u.sec_uid || 'N/A',
                    followers: s.followerCount || s.follower_count || u.follower_count || 0,
                    following: s.followingCount || s.following_count || u.following_count || 0,
                    friends: s.friendCount || s.friend_count || u.friend_count || 0,
                    likes: s.heartCount || s.heart_count || u.total_favorited || 0,
                    videos: s.videoCount || s.video_count || u.aweme_count || 0,
                    language: u.language || 'en',
                    privateAccount: u.privateAccount || u.is_private || false,
                    downloadSettings: u.downloadSetting || 'everyone',
                    duetSettings: u.duetSetting || 'everyone',
                    stitchSettings: u.stitchSetting || 'everyone',
                    nicknameModTime: u.nicknameModifyTime || u.nickname_modify_time || 0,
                    bioLink: u.bioLink?.link || u.bio_link || 'none',
                    profileTabMusic: u.profileTab?.music || false,
                    profileTabPlaylist: u.profileTab?.playlist || false,
                    suggestAccountBind: u.suggestAccountBind || false,
                    followersVisibility: u.followerStatus || u.follower_visibility || 'everyone'
                };
            }

            function renderDetails(d) {
                const formatDate = (ts) => {
                    if (!ts) return 'Unknown';
                    try { return new Date(ts * 1000).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
                    catch { return 'Invalid'; }
                };

                const fields = [
                    { label: '🌍 وڵات', value: d.country },
                    { label: '@ ئاست', value: d.level + '%' },
                    { label: '🆔 ژمارەی ئەکاونت', value: d.accountId },
                    { label: '📝 ناوی بەکارهێنەر', value: '@' + d.username },
                    { label: '🏷️ ناو', value: d.nickname },
                    { label: '📄 بایۆ', value: d.bio },
                    { label: '⏰ بەرواری دروستبوون', value: formatDate(d.createTime) },
                    { label: '✅ پشتڕاستکراوە', value: d.verified ? 'بەڵێ' : 'نەخێر', cls: d.verified ? 'yes' : 'no' },
                    { label: '🔑 Secret UID', value: d.secretUid.length > 24 ? d.secretUid.slice(0,24)+'…' : d.secretUid },
                    { label: '👥 شوێنکەوتوو', value: commas(d.followers) },
                    { label: '👣 بەشوێنکەوتوو', value: commas(d.following) },
                    { label: '🤝 هاوڕێکان', value: commas(d.friends) },
                    { label: '❤️ دڵخوازی', value: commas(d.likes) },
                    { label: '🎬 ڤیدیۆ', value: d.videos },
                    { label: '🗣️ زمان', value: d.language },
                    { label: '🔒 ئەکاونی تایبەت', value: d.privateAccount ? 'بەڵێ' : 'نەخێر', cls: d.privateAccount ? 'priv' : '' },
                    { label: '⬇️ ڕێگەپێدانی داونلۆد', value: d.downloadSettings },
                    { label: '🎤 ڕێگەپێدانی دیوێت', value: d.duetSettings },
                    { label: '✂️ ڕێگەپێدانی ستیچ', value: d.stitchSettings },
                    { label: '🕒 کاتی گۆڕینی ناو', value: d.nicknameModTime ? formatDate(d.nicknameModTime) : 'Never' },
                    { label: '🔗 لینکی بایۆ', value: d.bioLink },
                    { label: '🎵 میوزیک لە پڕۆفایل', value: d.profileTabMusic ? 'چالاک' : 'ناچالاک', cls: d.profileTabMusic ? 'yes' : 'no' },
                    { label: '📋 پلەیلیست لە پڕۆفایل', value: d.profileTabPlaylist ? 'چالاک' : 'ناچالاک', cls: d.profileTabPlaylist ? 'yes' : 'no' },
                    { label: '🔄 پێشنیاری بەستنەوە', value: d.suggestAccountBind ? 'بەڵێ' : 'نەخێر', cls: d.suggestAccountBind ? 'yes' : 'no' },
                    { label: '👁️ بینینی شوێنکەوتووان', value: d.followersVisibility }
                ];

                let html = '';
                fields.forEach(f => {
                    let cls = f.cls ? ` class="dvalue ${f.cls}"` : ' class="dvalue"';
                    html += `<div class="ditem"><span class="dlabel">${f.label}</span><span${cls}>${f.value}</span></div>`;
                });
                detailContainer.innerHTML = html;
            }

            async function scan() {
                let raw = targetInput.value;
                if (!raw) {
                    showError('ناوی بەکارهێنەر بنووسە');
                    return;
                }

                resultDiv.classList.remove('active');
                errorDiv.classList.remove('active');
                loadingDiv.classList.add('active');
                scanBtn.disabled = true;

                const userInfo = await fetchTikTok(raw);
                loadingDiv.classList.remove('active');
                scanBtn.disabled = false;

                if (!userInfo) {
                    showError(`@${raw.replace('@','')} — نەدۆزرایەوە`);
                    return;
                }

                const data = parseAll(userInfo);
                lastScan = data;

                avatarSpan.innerText = data.nickname.slice(0,2).toUpperCase() || 'ID';
                displayName.innerText = data.nickname;
                displayUname.innerHTML = `@${data.username} <span class="verif" id="verifTag">${data.verified ? '✓ پشتڕاستکراوە' : '⚡ پشتڕاستنەکراوە'}</span>`;
                
                mFollowers.innerText = compact(data.followers);
                mFollowing.innerText = compact(data.following);
                mLikes.innerText = compact(data.likes);
                mVideos.innerText = compact(data.videos);

                renderDetails(data);
                resultDiv.classList.add('active');
            }

            function showError(msg) {
                errorDiv.innerText = msg;
                errorDiv.classList.add('active');
            }

            scanBtn.addEventListener('click', scan);
            targetInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') scan();
            });

            document.getElementById('saveBtn').addEventListener('click', () => {
                if (!lastScan) return;
                const out = {
                    scanned: new Date().toISOString(),
                    profile: lastScan,
                    credit: '@t5kila'
                };
                const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `tiktok_${lastScan.username}_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(a.href);
            });

            // initial load with speed
            setTimeout(() => {
                if (targetInput.value) scan();
            }, 300);
        })();
    </script>
</body>
</html>
